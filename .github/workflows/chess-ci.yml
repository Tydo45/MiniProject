name: Chess CI

on:
  push:
    branches:
      - main
    paths:
      - 'chess-service/**'
      - '.github/workflows/lobby-ci.yml'
      - '.github/workflows/_python-service-ci.yml'
  workflow_dispatch:

jobs:
  lobby-ci:
    uses: ./.github/workflows/_python-service-ci.yml
    with:
      service_path: chess-service
