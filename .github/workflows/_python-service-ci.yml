name: Python Service CI

on:
  workflow_call:
    inputs:
      service_path:
        required: true
        type: string

env:
  DATABASE_URL: postgresql+psycopg://ci:ci@localhost:5432/ci
  SECRET_KEY: ci-not-a-secret

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.service_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ${{ inputs.service_path }}/pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Type check
        run: make type

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration

      - name: System tests
        run: make test-system
