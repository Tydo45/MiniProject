name: Chess CI

on:
  push:
    branches:
      - main
    paths:
      - 'Chess-Service/**'
      - '.github/workflows/chess-ci.yml'
      - '.github/workflows/_python-service-ci.yml'
  workflow_dispatch:

jobs:
  games-ci:
    uses: ./.github/workflows/_python-service-ci.yml
    with:
      service_path: chess
      python_package: chess
